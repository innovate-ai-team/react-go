name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build Go server
        working-directory: go-server
        run: |
          # Ensure syscall/js package is available for module download (for wasm package)
          GOOS=js GOARCH=wasm go mod download
          go build ./...

      - name: Run Go tests
        working-directory: go-server
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: javascript/frontend
        run: npm ci

      - name: Build frontend
        working-directory: javascript/frontend
        run: npm run build

      - name: Build Go WASM
        working-directory: go-server/wasm
        run: |
          GOOS=js GOARCH=wasm go build -o ../wasm/mathutils.wasm ./

      - name: Copy wasm_exec.js and wasm to frontend public
        run: |
          mkdir -p javascript/frontend/public
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" javascript/frontend/public/wasm_exec.js
          cp go-server/wasm/mathutils.wasm javascript/frontend/public/mathutils.wasm

      - name: Upload built frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: javascript/frontend/dist
